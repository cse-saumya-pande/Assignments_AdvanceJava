server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/saumya-pande/config-repo
          clone-on-start: true
          default-label: config-files       # your branch name

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka