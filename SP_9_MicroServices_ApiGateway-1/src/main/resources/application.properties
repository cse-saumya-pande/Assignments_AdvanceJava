spring.application.name=SP_9_MicroServices_ApiGateway-1

server.port=8085

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.discovery.enabled=true
spring.cloud.gateway.server.webflux.routes[0].id=department-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://Employee_MGMT
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/departments/**

spring.cloud.gateway.server.webflux.routes[1].id=order-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/orders/**